<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Tip Calculator App</title>
  </head>
  <body>
    <div class="container">
      <div class="leftSection">
        <div class="tipInputContainer">
          <h2>Bill</h2>
          <input type="text" class="tipInput" />
        </div>
        <div class="tipPercentage">
          <h3>Select Tip %</h3>
          <div class="percentages">
            <h3 class="tipAmount5">5%</h3>
            <h3 class="tipAmount">10%</h3>
            <h3 class="tipAmount">15%</h3>
            <!-- <input type="text" placeholder="Custom" /> -->
          </div>
          <div class="percentages-2">
            <h3 class="tipAmount">20%</h3>
            <h3 class="tipAmount">25%</h3>
            <h3 class="tipAmount">Custom</h3>
            <!-- <input type="text" placeholder="Custom" /> -->
          </div>
        </div>
        <div>
          <h4>Number of people</h4>
          <input type="text" class="peopleAmount" />
        </div>
      </div>
      
      <div class="rightSection">
        <div class="tipAmountContainer">
          <div class="tipAmount">
            <p>Tip Amount</p>
            <p>/ Person</p>
          </div>
          <div class="perPerson">
            $$$
          </div>
          </div>
         <!--  -->
         <div class="totalContainer">
            <div >
            <p>Total</p>
            <p>/ Person</p>
          </div>
            <div class="perPerson">
              $$$
          </div>
        </div>
          <button>Reset</button>
        </div>
      </div>
    </div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
    <script src="script.js"></script>
  </body>
</html>
